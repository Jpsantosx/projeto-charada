<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Gerador de Charadas</title>
</head>
<body class="bg-lime-100 flex flex-col items-center justify-center min-h-screen p-4">

    <h1 class="text-3xl font-bold mb-12">Gerador de Charadas</h1>

    <div class="group w-full max-w-sm [perspective:1000px] h-64">
        <div id="card-inner" class="relative w-full h-full transition-all duration-500 [transform-style:preserve-3d] cursor-pointer shadow-2xl rounded-2xl">
           
            <div class="absolute inset-0 [backface-visibility:hidden] bg-white rounded-2xl flex flex-col items-center justify-center p-6 text-center border-2 border-blue-500">
                <span class="text-blue-500 font-bold uppercase tracking-widest text-xs mb-2">Pergunta</span>
                <p id="pergunta" class="text-xl font-medium text-gray-800 italic">Carregando charada...</p>
                <p class="mt-4 text-gray-400 text-xs font-light">Clique para ver a resposta</p>
            </div>

            <div class="absolute inset-0 [backface-visibility:hidden] bg-blue-600 rounded-2xl flex flex-col items-center justify-center p-6 text-center text-white [transform:rotateY(180deg)]">
                <span class="text-blue-200 font-bold uppercase tracking-widest text-xs mb-2">Resposta</span>
                <p id="resposta" class="text-2xl font-bold"></p>
            </div>

        </div>
    </div>

    <div class="mt-8 w-full max-w-sm bg-white p-4 rounded-xl shadow-md border-t-4 border-blue-500">
        <label for="input-palpite" class="block text-sm font-bold text-gray-600 mb-2 uppercase text-center">Tente adivinhar!</label>
        <div class="flex gap-2">
            <input type="text" id="input-palpite" placeholder="Sua resposta..." class="flex-1 border-2 border-gray-200 rounded-lg px-3 py-2 focus:border-blue-400 outline-none transition-colors">
            <button id="btn-verificar" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded-lg transition-transform active:scale-95">
                Verificar
            </button>
        </div>
        <p id="feedback" class="mt-3 text-sm font-bold text-center hidden"></p>
    </div>

    <button id="btn-nova" class="mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full transition-transform active:scale-95 shadow-lg">
        Nova Charada 🎲
    </button>

    <div class="mt-10 w-full max-w-sm">
        <h2 class="text-gray-500 font-bold text-xs uppercase tracking-widest mb-4 flex items-center justify-center">
            <span class="mr-2">🕒</span> Últimas Charadas
        </h2>
        <ul id="historico" class="space-y-2">
            </ul>
    </div>

<script src="javascript.js"></script>
</body>
</html>
