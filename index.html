<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <title>Gerador de Charadas | ARCADE</title>
    <style>
        body {
            font-family: 'Press Start 2P', cursive;
            background-color: #0d0221;
            background-image: radial-gradient(#261447 1px, transparent 1px);
            background-size: 20px 20px;
            color: #00f2ff;
        }

        /* Efeito de Scanlines (Linhas de TV antiga) */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .neon-border {
            border: 4px solid #ff00ff;
            box-shadow: 0 0 10px #ff00ff, inset 0 0 10px #ff00ff;
        }

        .neon-text {
            text-shadow: 3px 3px 0px #ff00ff;
        }

        .pixel-button {
            box-shadow: 4px 4px 0px #5a005a;
        }

        .pixel-button:active {
            box-shadow: 0px 0px 0px #5a005a;
            transform: translate(4px, 4px);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 overflow-x-hidden">

    <h1 class="text-2xl md:text-4xl font-bold mb-12 text-center neon-text text-yellow-300 italic tracking-tighter">
        RIDDLE <span class="text-white block mt-2">MASTER 3000</span>
    </h1>

    <div class="group w-full max-w-sm [perspective:1000px] h-64">
        <div id="card-inner" class="relative w-full h-full transition-all duration-500 [transform-style:preserve-3d] cursor-pointer">
            
            <div class="absolute inset-0 [backface-visibility:hidden] bg-black neon-border rounded-none flex flex-col items-center justify-center p-6 text-center">
                <span class="text-magenta-500 font-bold uppercase text-[10px] mb-4 text-pink-500">PLAYER 1: PERGUNTA</span>
                <p id="pergunta" class="text-sm leading-relaxed text-cyan-400 uppercase">Carregando missão...</p>
                <p class="mt-8 text-yellow-400 text-[8px] animate-pulse">PRESS START TO REVEAL</p>
            </div>

            <div class="absolute inset-0 [backface-visibility:hidden] bg-pink-600 border-4 border-white rounded-none flex flex-col items-center justify-center p-6 text-center text-white [transform:rotateY(180deg)] shadow-[0_0_20px_#ff00ff]">
                <span class="text-[10px] mb-4 text-black bg-white px-2 py-1">BONUS REVEALED</span>
                <p id="resposta" class="text-lg font-bold uppercase"></p>
            </div>

        </div>
    </div>

    <div class="mt-12 w-full max-w-sm bg-black p-6 border-4 border-cyan-400">
        <label for="input-palpite" class="block text-[10px] font-bold text-cyan-400 mb-4 uppercase text-center">Digite seu palpite:</label>
        <div class="flex flex-col gap-4">
            <input type="text" id="input-palpite" placeholder="________" 
                class="bg-transparent border-b-4 border-cyan-900 text-white text-center py-2 focus:border-pink-500 outline-none transition-colors uppercase placeholder-cyan-900">
            
            <button id="btn-verificar" class="bg-green-500 hover:bg-green-400 text-black font-bold py-3 px-4 pixel-button transition-all uppercase text-[12px]">
                [ CHECK ]
            </button>
        </div>
        <p id="feedback" class="mt-4 text-[10px] text-center hidden"></p>
    </div>

    <button id="btn-nova" class="mt-10 bg-yellow-400 hover:bg-yellow-300 text-black font-bold py-4 px-10 pixel-button transition-all uppercase text-[12px]">
        INSERT COIN (New)
    </button>

    <div class="mt-12 w-full max-w-sm mb-10">
        <h2 class="text-pink-500 font-bold text-[10px] uppercase mb-4 flex items-center justify-center">
            <span class="mr-2">★</span> HIGH SCORES <span class="ml-2">★</span>
        </h2>
        <ul id="historico" class="space-y-2 text-[8px] text-cyan-700 bg-black/50 p-4 border border-dashed border-cyan-900">
            </ul>
    </div>

    <script src="javascript.js"></script>
</body>
</html>
